<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>SULAP RADIO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root{ --y:#f8ff00; --neon:#00d4ff; --p1:#ff3d81; --p2:#ff9d00; }
    html,body{background:#000;color:#fff;font-family:Roboto,sans-serif;margin:0;overflow-x:hidden}
    #hero-slider{position:absolute;inset:0;z-index:0;height:100%; background:#000; cursor: zoom-in;}
    .slide{position:absolute;inset:0;background-size:cover;background-position: center 20%; opacity:0; height:100%; transition: opacity 1.4s ease-in-out; z-index: 0;}
    .slide.active{opacity:1; z-index: 1;}
    .hero-overlay{position:absolute;inset:0;z-index:2;background:radial-gradient(65% 55% at 50% 38%,rgba(0,0,0,.04) 0%,rgba(0,0,0,.18) 60%,rgba(0,0,0,.52) 100%); pointer-events: none;}
    nav{ padding:10px 12px!important; pointer-events: none; }
    .station-logo, #clock { pointer-events: auto; }
    .station-logo{height:72px;width:auto;filter:drop-shadow(0 0 10px rgba(248,255,0,.18))}
    #clock{font-size: 11px; letter-spacing: 0.1em; color:rgba(255,255,255,0.7); font-weight: 700; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); padding: 5px 10px; border-radius: 999px; position:absolute; top:10px; right:12px; z-index:60;}
    #splash{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .btn{border-radius:999px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;font-size:10px;padding:10px 14px;transition:transform .18s ease}
    .btnY{background:var(--y);color:#000}
    .player-strip{background: linear-gradient(180deg, rgba(10,0,20,.92) 0%, rgba(0,0,0,.92) 100%); border-top: 2px solid rgba(0,212,255,.45); position: relative; z-index: 10; padding: 20px 0;}
    .player-inner{max-width: 1200px; margin: 0 auto; padding: 14px 16px; display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;}
    .art-container{position:relative;width:82px;height:82px;}
    .p-art{width: 82px; height: 82px; border-radius:18px; border: 4px solid var(--neon); background:#0b0014; background-size:cover; background-position:center; cursor:pointer;}
    .p-title{font-size:15px;font-weight:900;text-transform:uppercase;color:var(--neon); line-height:1.1;}
    .p-artist{font-size:12px;font-weight:800;color:rgba(0,212,255,.90); margin-top:2px;}
    .p-progress{margin-top:8px;height:6px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden}
    .p-progress > div{height:100%;width:0%;background:linear-gradient(to right,var(--p1),var(--p2));transition:width .35s linear}
    .p-actions{display:flex;align-items:center;gap:10px;}
    .p-btn{border:0;background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:10px 12px;font-weight:900;font-size:10px;text-transform:uppercase;cursor:pointer;}
    #volDock, #chatDock{ position: fixed; right: 12px; z-index: 9999; display:flex; flex-direction: column; gap:8px; padding: 10px; border-radius: 18px; background: rgba(15, 0, 30, 0.52); border: 1px solid rgba(0, 212, 255, 0.55); backdrop-filter: blur(12px); }
    #volDock{ top: 50%; transform: translateY(-50%); }
    #chatDock{ top: calc(50% + 110px); } 
    .chat-float-btn{ width: 38px; height: 38px; border-radius: 999px; background: rgba(255,255,255,.08); color:#fff; display:flex;align-items:center;justify-content:center; }
    .lightbox{position:fixed; inset:0; z-index:99999; background: rgba(0,0,0,.86); display:none; align-items:center; justify-content:center; padding:18px;}
    .lightbox.open{display:flex}
    .lightbox-card{width:min(92vw,720px);border-radius:22px;overflow:hidden;border:2px solid rgba(0,212,255,.35);background:rgba(10,0,20,.55);}
  </style>
</head>

<body>
  <audio id="a" preload="none" src="https://sulapradio.info/listen/sulap_radio/radio.mp3" style="display:none"></audio>
  
  <div id="volDock"><button id="volBtn" type="button"><i id="volIcon" class="fas fa-volume-up"></i></button></div>
  <div id="chatDock"><a href="https://m.me/sulap.compound" target="_blank" rel="noopener" class="chat-float-btn"><i class="fa-brands fa-facebook-messenger"></i></a></div>

  <div id="splash">
    <img src="img/logo.png" class="h-20 mb-6" alt="SULAP RADIO">
    <button class="btn btnY px-8 py-3" onclick="startStation()">TUNE IN</button>
  </div>

  <section id="hero-area" class="relative w-full aspect-[16/10] md:aspect-[21/9] overflow-hidden px-0">
    <div id="hero-slider"></div>
    <div class="hero-overlay"></div>
    <nav class="absolute top-0 left-0 w-full z-50 flex justify-between items-start">
      <img src="img/logo.png" alt="SULAP RADIO" class="station-logo">
      <div id="clock"></div>
    </nav>
  </section>

  <section class="player-strip">
    <div class="player-inner">
      <div class="art-container" id="artCont">
          <button type="button" id="pArt" class="p-art"></button>
      </div>
      <div class="p-meta">
        <div class="p-title" id="pTitle">Loading...</div>
        <div class="p-artist" id="pArtist">—</div>
        <div class="p-progress"><div id="pBar"></div></div>
      </div>
      <div class="p-actions">
        <button class="p-btn" id="reconnect"><i class="fa-solid fa-rotate"></i></button>
        <a class="p-btn" id="requestBtn" href="#" target="_blank"><i class="fa-solid fa-music"></i> REQUEST A SONG</a>
        <a class="p-btn" href="https://m.me/sulap.compound" target="_blank"><i class="fa-brands fa-facebook-messenger"></i> CHAT WITH SULAP</a>
      </div>
    </div>
  </section>

  <div id="artLightbox" class="lightbox">
    <div class="lightbox-card">
      <img id="lbImg" style="width:100%;height:auto;display:block;">
    </div>
  </div>

  <script>
    (function(){
      const O = { b: "https://sulapradio.info/api", i: 2, l: "https://sulapradio.info/listen/sulap_radio/radio.mp3", d: "img/default_art.jpg", pub: "https://sulapradio.info/public/sulap_radio" };
      const A = document.getElementById("a");
      function updateClock(){ const t = new Date(); $("#clock").text(t.toLocaleTimeString()); }
      function reconnect(){ A.pause(); A.src = O.l; A.load(); A.play().catch(()=>{}); }
      window.startStation = function(){ reconnect(); $("#splash").fadeOut(); };
      
      function updateNowPlaying(){ 
          $.ajax({ url: O.b + "/nowplaying/" + O.i, success: function(d){ 
              if(d?.now_playing?.song){
                  $("#pTitle").text(d.now_playing.song.title); 
                  $("#pArtist").text(d.now_playing.song.artist); 
                  $("#pArt").css("backgroundImage", "url(" + (d.now_playing.song.art || O.d) + ")");
                  $("#pBar").css("width", (d.now_playing.duration > 0 ? (d.now_playing.elapsed/d.now_playing.duration)*100 : 0) + "%");
              }
          }}); 
      }
      $(document).ready(function(){
        $("#requestBtn").attr("href", O.pub + "#/requests"); 
        $("#reconnect").on("click", reconnect); 
        setInterval(updateClock, 1000); 
        setInterval(updateNowPlaying, 5000);
        let slides = ""; for(let a=1; a<=20; a++) slides += "<div class='slide' id='slide-"+a+"' style=\"background-image:url('img/slide" + a + ".jpg');\"></div>"; 
        $("#hero-slider").html(slides); let current = 1; $(`#slide-${current}`).addClass('active');
        setInterval(function(){ $(`#slide-${current}`).removeClass('active'); current = (current % 20) + 1; $(`#slide-${current}`).addClass('active'); }, 5200);
      });
    })();
  </script>
</body>
</html>
